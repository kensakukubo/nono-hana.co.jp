name: Deploy to Xserver

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Deploy via SFTP
        uses: wlixcc/SFTP-Deploy-Action@v1.2.4
        with:
          username: ${{ secrets.XSERVER_USER }}
          server: ${{ secrets.XSERVER_HOST }}
          port: 10022
          ssh_private_key: ${{ secrets.XSERVER_KEY }}
          local_path: grouphome/wp-content/themes/grouphome/*
          remote_path: ${{ secrets.XSERVER_PATH }}
          sftp_only: true
