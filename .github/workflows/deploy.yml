name: Deploy to Xserver

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # drone-scp は source を tar 化する際にリポジトリ相対パスを保持するため、
      # そのままだとリモートで .../grouphome/wp-content/themes/grouphome/... に展開され、
      # WP が読む themes/grouphome/ 直下が更新されない。1 階層に潰してから送る。
      - name: Stage theme (flat directory)
        run: |
          rm -rf _deploy_theme
          cp -a grouphome/wp-content/themes/grouphome/. _deploy_theme/

      - name: SCP theme
        uses: appleboy/scp-action@v1.0.0
        with:
          host: ${{ secrets.XSERVER_HOST }}
          username: ${{ secrets.XSERVER_USER }}
          key: ${{ secrets.XSERVER_KEY }}
          passphrase: ${{ secrets.XSERVER_KEY_PASSPHRASE }}
          port: 10022
          protocol: tcp4
          use_insecure_cipher: true
          timeout: 120s
          command_timeout: 15m
          source: _deploy_theme
          strip_components: 1
          target: ${{ secrets.XSERVER_PATH }}
          overwrite: true
