name: Deploy to Xserver

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Xserver 共有ではリモートに rsync が無く rsync over SSH が失敗しやすい。
      # drone-scp（tar + ssh で展開）ならリモートに rsync 不要。
      # XSERVER_PATH: サーバー上のテーマの絶対パス（例: .../wp-content/themes/grouphome）
      - name: SCP theme (tar over SSH)
        uses: appleboy/scp-action@v1.0.0
        with:
          host: ${{ secrets.XSERVER_HOST }}
          username: ${{ secrets.XSERVER_USER }}
          key: ${{ secrets.XSERVER_KEY }}
          port: 10022
          timeout: 60s
          command_timeout: 15m
          source: grouphome/wp-content/themes/grouphome
          target: ${{ secrets.XSERVER_PATH }}
          overwrite: true
          debug: true
