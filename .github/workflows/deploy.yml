name: Deploy to Xserver

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # SFTP 専用アクションは Docker 内の put -r と相性問題がありやすいため、
      # ssh-agent + rsync で同期（ログも追いやすい）
      - uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.XSERVER_KEY }}

      - name: Rsync theme to Xserver
        env:
          SSH_HOST: ${{ secrets.XSERVER_HOST }}
          SSH_USER: ${{ secrets.XSERVER_USER }}
          REMOTE_PATH: ${{ secrets.XSERVER_PATH }}
        run: |
          set -eux
          test -n "${SSH_HOST}" && test -n "${SSH_USER}" && test -n "${REMOTE_PATH}"
          rsync -avz \
            -e "ssh -p 10022 -o StrictHostKeyChecking=accept-new" \
            ./grouphome/wp-content/themes/grouphome/ \
            "${SSH_USER}@${SSH_HOST}:${REMOTE_PATH}/"
